<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RinggitScan — Malaysian Banknote Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #12151a;
    --surface: #1c2128;
    --surface-2: #262c35;
    --border: #323a45;
    --text: #eef1f4;
    --text-dim: #8c97a3;
    --accent: #2dd4bf;
    --frame-color: var(--accent);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .page {
    max-width: 920px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  .header { margin-bottom: 28px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin: 0 0 8px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(32px, 6vw, 48px);
    font-weight: 700;
    margin: 0 0 8px;
  }
  .lede {
    color: var(--text-dim);
    max-width: 540px;
    margin: 0;
    font-size: 15px;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
  }
  .scanner-panel, .result-panel { display: flex; flex-direction: column; gap: 16px; }

  /* ── Viewport ── */
  .viewport {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 420px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color 0.3s ease;
  }
  .viewport.is-live { border-color: var(--accent); }

  /* Live webcam canvas */
  #webcam-container {
    position: absolute;
    inset: 0;
  }
  #webcam-container canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    object-fit: cover;
  }

  /* Frozen snapshot canvas */
  #snapshot {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  .viewport.is-frozen #snapshot { display: block; }

  /* Corner-bracket frame */
  .frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .frame path {
    stroke: var(--frame-color);
    stroke-width: 3;
    stroke-linecap: round;
    fill: none;
    transition: stroke 0.3s ease;
  }

  /* Analysing flash overlay */
  .flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    border-radius: var(--radius);
    transition: opacity 0.08s ease;
  }
  .viewport.is-flashing .flash { opacity: 0.55; }

  /* Placeholder when camera is off */
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    gap: 8px;
    padding: 20px;
    background: var(--surface);
  }
  .placeholder svg { opacity: 0.3; }
  .placeholder[hidden] { display: none; }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 12px 22px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.1s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: var(--accent); color: #0b1410; }
  .btn-ghost {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn[hidden] { display: none; }

  .voice-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    margin-left: auto;
  }
  .voice-toggle input { accent-color: var(--accent); width: 16px; height: 16px; }

  /* ── Result card ── */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color 0.3s ease;
  }
  .result-card.is-active { border-color: var(--frame-color); }
  .result-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 6px;
  }
  .result-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 700;
    margin: 0 0 4px;
    color: var(--text);
    transition: color 0.3s ease;
  }
  .result-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    margin: 0;
  }

  /* Analysing spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Confidence bars ── */
  .denom-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .denom-grid[hidden] { display: none; }
  .denom-row {
    display: grid;
    grid-template-columns: 10px 64px 1fr 44px;
    align-items: center;
    gap: 12px;
    padding: 4px 0;
  }
  .denom-swatch { width: 10px; height: 10px; border-radius: 50%; }
  .denom-label {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    transition: color 0.3s ease;
  }
  .denom-bar {
    height: 6px;
    border-radius: 4px;
    background: var(--surface-2);
    overflow: hidden;
  }
  .denom-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.35s ease;
  }
  .denom-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }
  .denom-row.is-leading .denom-label { color: var(--frame-color); }

  /* ── Footer setup ── */
  .setup {
    margin-top: 36px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .setup summary {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    cursor: pointer;
    color: var(--text);
  }
  .setup ol { color: var(--text-dim); font-size: 14px; padding-left: 20px; }
  .setup li { margin-bottom: 8px; }
  .setup code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  .setup a { color: var(--accent); }
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <p class="eyebrow">Currency Scanner · Malaysia</p>
    <h1>RinggitScan2.0</h1>
    <p class="lede">Open the camera, hold a Ringgit banknote steady in the frame, then tap <strong>Capture</strong> to identify it.</p>
  </header>

  <main class="layout">
    <!-- Left: camera viewport + controls -->
    <section class="scanner-panel">
      <div class="viewport" id="viewport">
        <div id="webcam-container"></div>
        <canvas id="snapshot"></canvas>
        <svg class="frame" viewBox="0 0 100 100">
          <path d="M6 18 V6 H18" />
          <path d="M82 6 H94 V18" />
          <path d="M94 82 V94 H82" />
          <path d="M18 94 H6 V82" />
        </svg>
        <div class="flash" id="flash"></div>
        <div class="placeholder" id="placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <p>Tap "Open Camera" to begin.</p>
        </div>
      </div>

      <div class="controls">
        <!-- State A: camera off -->
        <button class="btn btn-primary" id="openBtn">Open Camera</button>

        <!-- State B: live viewfinder -->
        <button class="btn btn-primary" id="captureBtn" hidden>Capture</button>
        <button class="btn btn-ghost"   id="closeBtn"   hidden>Close</button>

        <!-- State C: frozen / result shown -->
        <button class="btn btn-primary" id="retakeBtn"  hidden>Retake</button>

        <label class="voice-toggle">
          <input type="checkbox" id="voiceToggle" checked />
          <span>Speak result</span>
        </label>
      </div>
    </section>

    <!-- Right: result + confidence bars -->
    <section class="result-panel">
      <div class="result-card" id="resultCard">
        <p class="result-eyebrow" id="resultEyebrow">Ready</p>
        <p class="result-value"   id="resultValue">—</p>
        <p class="result-sub"     id="resultSub">Open the camera and capture a banknote.</p>
      </div>
      <div class="denom-grid" id="denomGrid" hidden></div>
    </section>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const MODEL_URL = "./my_model/";
  const CONFIDENCE_THRESHOLD = 0.70; // lower than live mode — single shot is cleaner

  const DENOMINATIONS = {
    RM1:   { label: "RM 1",   color: "#8b5cf6" },
    RM5:   { label: "RM 5",   color: "#22c55e" },
    RM10:  { label: "RM 10",  color: "#ef4444" },
    RM20:  { label: "RM 20",  color: "#f59e0b" },
    RM50:  { label: "RM 50",  color: "#0ea5e9" },
    RM100: { label: "RM 100", color: "#ec4899" },
  };
  const NO_NOTE_KEYS = new Set(["BACKGROUND","NOTHING","NONE","EMPTY","NEGATIVE","OTHER","BLANK"]);

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const viewport    = document.getElementById("viewport");
  const placeholder = document.getElementById("placeholder");
  const flash       = document.getElementById("flash");
  const snapshot    = document.getElementById("snapshot");
  const openBtn     = document.getElementById("openBtn");
  const captureBtn  = document.getElementById("captureBtn");
  const closeBtn    = document.getElementById("closeBtn");
  const retakeBtn   = document.getElementById("retakeBtn");
  const voiceToggle = document.getElementById("voiceToggle");
  const resultCard  = document.getElementById("resultCard");
  const resultEyebrow = document.getElementById("resultEyebrow");
  const resultValue   = document.getElementById("resultValue");
  const resultSub     = document.getElementById("resultSub");
  const denomGrid     = document.getElementById("denomGrid");

  // ── State ───────────────────────────────────────────────────────────────────
  let model = null;
  let webcam = null;
  let liveLoop = false;

  // ── Build confidence bar rows ────────────────────────────────────────────────
  const barEls = {};
  Object.entries(DENOMINATIONS).forEach(([key, info]) => {
    const row = document.createElement("div");
    row.className = "denom-row";
    row.innerHTML = `
      <span class="denom-swatch" style="background:${info.color}"></span>
      <span class="denom-label">${info.label}</span>
      <div class="denom-bar"><div class="denom-bar-fill" style="background:${info.color}"></div></div>
      <span class="denom-pct">—</span>
    `;
    denomGrid.appendChild(row);
    barEls[key] = {
      row,
      fill: row.querySelector(".denom-bar-fill"),
      pct:  row.querySelector(".denom-pct"),
    };
  });

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function normalize(name) {
    const upper = name.toUpperCase();
    const match = upper.match(/RM\s*-?\s*(\d+)/);
    if (match) return "RM" + match[1];
    return upper.replace(/[^A-Z0-9]/g, "");
  }

  function setFrameColor(color) {
    document.documentElement.style.setProperty("--frame-color", color);
  }

  function resetBars() {
    Object.values(barEls).forEach(({ fill, pct, row }) => {
      fill.style.width = "0%";
      pct.textContent = "—";
      row.classList.remove("is-leading");
    });
  }

  function announce(label) {
    if (!voiceToggle.checked || !("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(label));
  }

  // ── UI states ────────────────────────────────────────────────────────────────
  function setState(state) {
    // 'idle' | 'live' | 'analysing' | 'result' | 'unsure'
    openBtn.hidden    = state !== "idle";
    captureBtn.hidden = state !== "live";
    closeBtn.hidden   = state !== "live";
    retakeBtn.hidden  = state !== "result" && state !== "unsure";

    captureBtn.disabled = state === "analysing";

    if (state === "idle") {
      viewport.classList.remove("is-live", "is-frozen");
      placeholder.hidden = false;
      denomGrid.hidden = true;
      resultCard.classList.remove("is-active");
      resultEyebrow.textContent = "Ready";
      resultValue.textContent = "—";
      resultValue.style.color = "var(--text)";
      resultSub.textContent = "Open the camera and capture a banknote.";
      resultSub.innerHTML = resultSub.textContent;
      setFrameColor("var(--accent)");
      resetBars();
    }
    if (state === "live") {
      viewport.classList.add("is-live");
      viewport.classList.remove("is-frozen");
      placeholder.hidden = true;
      resultCard.classList.remove("is-active");
      resultEyebrow.textContent = "Waiting";
      resultValue.textContent = "—";
      resultValue.style.color = "var(--text)";
      resultSub.textContent = "Position the banknote clearly in the frame, then tap Capture.";
      setFrameColor("var(--accent)");
    }
    if (state === "analysing") {
      resultEyebrow.innerHTML = '<span class="spinner"></span>Analysing';
      resultValue.textContent = "…";
      resultValue.style.color = "var(--text-dim)";
      resultSub.textContent = "Running the model on your capture…";
      resetBars();
      denomGrid.hidden = false;
    }
  }

  // ── Camera ───────────────────────────────────────────────────────────────────
  async function loadModel() {
    if (model) return;
    openBtn.disabled = true;
    openBtn.textContent = "Loading…";
    model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
    openBtn.disabled = false;
    openBtn.textContent = "Open Camera";
  }

  async function openCamera() {
    await loadModel();

    // Always create a fresh webcam — setup() can't be reused on a stopped instance.
    const container = document.getElementById("webcam-container");
    container.innerHTML = "";
    webcam = new tmImage.Webcam(400, 400, false);
    try {
      await webcam.setup({ facingMode: "environment" });
    } catch {
      await webcam.setup();
    }
    container.appendChild(webcam.canvas);
    await webcam.play();

    // Keep the viewfinder alive (no predictions yet)
    liveLoop = true;
    (function tick() {
      if (!liveLoop) return;
      webcam.update();
      requestAnimationFrame(tick);
    })();

    setState("live");
  }

  function closeCamera() {
    liveLoop = false;
    webcam.stop();
    setState("idle");
  }

  // ── Capture & predict ────────────────────────────────────────────────────────
  async function capture() {
    // 1. Flash effect
    viewport.classList.add("is-flashing");
    await new Promise(r => setTimeout(r, 120));
    viewport.classList.remove("is-flashing");

    // 2. Freeze: copy current frame to snapshot canvas, hide webcam
    snapshot.width  = webcam.canvas.width;
    snapshot.height = webcam.canvas.height;
    snapshot.getContext("2d").drawImage(webcam.canvas, 0, 0);
    liveLoop = false;
    webcam.stop();
    viewport.classList.add("is-frozen");

    setState("analysing");

    // 3. Run the model on the frozen canvas
    const predictions = await model.predict(snapshot);

    // 4. Find top prediction
    let top = predictions[0];
    predictions.forEach(p => { if (p.probability > top.probability) top = p; });
    const topKey = normalize(top.className);

    // 5. Update bars
    predictions.forEach(p => {
      const key = normalize(p.className);
      if (!barEls[key]) return;
      const pct = Math.round(p.probability * 100);
      barEls[key].fill.style.width = pct + "%";
      barEls[key].pct.textContent = pct + "%";
      barEls[key].row.classList.remove("is-leading");
    });

    // 6. Show result or "not sure"
    if (DENOMINATIONS[topKey] && top.probability >= CONFIDENCE_THRESHOLD) {
      const info = DENOMINATIONS[topKey];
      barEls[topKey]?.row.classList.add("is-leading");
      setFrameColor(info.color);
      resultCard.classList.add("is-active");
      resultEyebrow.textContent = "Detected";
      resultValue.textContent = info.label;
      resultValue.style.color = info.color;
      resultSub.textContent = Math.round(top.probability * 100) + "% confidence";
      announce(info.label);
      setState("result");
    } else {
      setFrameColor("#f59e0b");
      resultCard.classList.add("is-active");
      resultEyebrow.textContent = "Not sure";
      resultValue.textContent = "?";
      resultValue.style.color = "#f59e0b";
      resultSub.textContent = "Confidence too low — try better lighting or hold the note flatter.";
      setState("unsure");
    }
  }

  // ── Retake: reopen the camera and try again ──────────────────────────────────
  async function retake() {
    viewport.classList.remove("is-frozen");
    resetBars();
    denomGrid.hidden = true;

    // Remove the old canvas and create a fresh webcam — setup() can't be
    // called again on a stopped instance so we always start from scratch.
    const container = document.getElementById("webcam-container");
    container.innerHTML = "";
    webcam = new tmImage.Webcam(400, 400, false);
    try {
      await webcam.setup({ facingMode: "environment" });
    } catch {
      await webcam.setup();
    }
    container.appendChild(webcam.canvas);
    await webcam.play();

    liveLoop = true;
    (function tick() {
      if (!liveLoop) return;
      webcam.update();
      requestAnimationFrame(tick);
    })();

    setState("live");
  }

  // ── Button wiring ────────────────────────────────────────────────────────────
  openBtn.addEventListener("click", openCamera);
  closeBtn.addEventListener("click", closeCamera);
  captureBtn.addEventListener("click", capture);
  retakeBtn.addEventListener("click", retake);
</script>
</body>
</html>
