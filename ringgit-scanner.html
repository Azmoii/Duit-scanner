<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RinggitScan — Malaysian Banknote Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #12151a;
    --surface: #1c2128;
    --surface-2: #262c35;
    --border: #323a45;
    --text: #eef1f4;
    --text-dim: #8c97a3;
    --accent: #2dd4bf;
    --frame-color: var(--accent);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .page {
    max-width: 920px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  .header { margin-bottom: 28px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin: 0 0 8px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(32px, 6vw, 48px);
    font-weight: 700;
    margin: 0 0 8px;
  }
  .lede {
    color: var(--text-dim);
    max-width: 540px;
    margin: 0;
    font-size: 15px;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
  }
  .scanner-panel, .result-panel { display: flex; flex-direction: column; gap: 16px; }

  .viewport {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 420px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  #webcam-container {
    position: absolute;
    inset: 0;
  }
  #webcam-container canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    object-fit: cover;
  }
  .frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .frame path {
    stroke: var(--frame-color);
    stroke-width: 3;
    stroke-linecap: round;
    fill: none;
    transition: stroke 0.3s ease;
  }
  .viewport.is-scanning::after {
    content: '';
    position: absolute;
    left: 6%;
    right: 6%;
    height: 2px;
    top: 8%;
    background: linear-gradient(90deg, transparent, var(--frame-color), transparent);
    box-shadow: 0 0 14px var(--frame-color);
    animation: scan-sweep 2.6s ease-in-out infinite;
  }
  @keyframes scan-sweep {
    0%, 100% { top: 8%; opacity: 0.9; }
    50% { top: 90%; opacity: 0.35; }
  }
  @media (prefers-reduced-motion: reduce) {
    .viewport.is-scanning::after { animation: none; }
  }
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 20px;
    background: var(--surface);
  }
  .placeholder[hidden] { display: none; }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 12px 22px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.1s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .btn-primary {
    background: var(--accent);
    color: #0b1410;
  }
  .voice-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .voice-toggle input { accent-color: var(--accent); width: 16px; height: 16px; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color 0.3s ease;
  }
  .result-card.is-active { border-color: var(--frame-color); }
  .result-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 6px;
  }
  .result-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 700;
    margin: 0 0 4px;
    color: var(--text);
    transition: color 0.3s ease;
  }
  .result-confidence {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    margin: 0;
  }
  .result-confidence a { color: var(--accent); }

  .denom-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .denom-row {
    display: grid;
    grid-template-columns: 12px 64px 1fr 44px;
    align-items: center;
    gap: 12px;
    padding: 6px 0;
  }
  .denom-swatch {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .denom-label {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    transition: color 0.3s ease;
  }
  .denom-bar {
    height: 6px;
    border-radius: 4px;
    background: var(--surface-2);
    overflow: hidden;
  }
  .denom-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.2s ease;
  }
  .denom-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }
  .denom-row.is-leading .denom-label { color: var(--frame-color); }

  .setup {
    margin-top: 36px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .setup summary {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    cursor: pointer;
    color: var(--text);
  }
  .setup ol {
    color: var(--text-dim);
    font-size: 14px;
    padding-left: 20px;
  }
  .setup li { margin-bottom: 8px; }
  .setup code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  .setup a { color: var(--accent); }
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <p class="eyebrow">Currency Scanner · Malaysia</p>
    <h1>RinggitScan</h1>
    <p class="lede">Point the camera at a Malaysian Ringgit banknote and RinggitScan tells you which one it is — RM1, RM5, RM10, RM20, RM50, or RM100.</p>
  </header>

  <main class="layout">
    <section class="scanner-panel">
      <div class="viewport" id="viewport">
        <div id="webcam-container"></div>
        <svg class="frame" viewBox="0 0 100 100" id="frame">
          <path d="M6 18 V6 H18" />
          <path d="M82 6 H94 V18" />
          <path d="M94 82 V94 H82" />
          <path d="M18 94 H6 V82" />
        </svg>
        <div class="placeholder" id="placeholder">
          <p>Camera is off.<br />Tap "Start scanning" to begin.</p>
        </div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="toggleBtn">Start scanning</button>
        <label class="voice-toggle">
          <input type="checkbox" id="voiceToggle" checked />
          <span>Speak result aloud</span>
        </label>
      </div>
    </section>

    <section class="result-panel">
      <div class="result-card" id="resultCard">
        <p class="result-label" id="resultEyebrow">Waiting</p>
        <p class="result-value" id="resultValue">—</p>
        <p class="result-confidence" id="resultConfidence">Start scanning to identify a banknote.</p>
      </div>
      <div class="denom-grid" id="denomGrid"></div>
    </section>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
  // 1) Put your Teachable Machine model link here — either a hosted "shareable
  //    link" (ends in /) from the Export panel, or "./my_model/" if you
  //    downloaded model.json, metadata.json and weights.bin into a folder
  //    called "my_model" next to this HTML file.
  const MODEL_URL = "./my_model/";

  // How confident the model needs to be before we report a result.
  const CONFIDENCE_THRESHOLD = 0.5;
  // Confidence level at which scanning stops immediately and locks the result.
  const LOCK_THRESHOLD = 0.65;
  // Auto-stop after this many ms even if confidence never hit LOCK_THRESHOLD.
  const AUTO_STOP_MS = 5000;
  // Minimum time between repeated voice announcements of the same note.
  const ANNOUNCE_COOLDOWN_MS = 1000;

  // Maps your Teachable Machine class names to a display label and color.
  // If your class names differ (e.g. "1 Ringgit"), update the keys here —
  // they're matched case-insensitively with spaces/punctuation removed.
  const DENOMINATIONS = {
    DUITKERTASRM1:   { label: "RM 1",   color: "#6580C3" },
    DUITKERTASRM5:   { label: "RM 5",   color: "#5FB365" },
    DUITKERTASRM10:  { label: "RM 10",  color: "#B84C50" },
    DUITKERTASRM20:  { label: "RM 20",  color: "#ECAC53" },
    DUITKERTASRM50:  { label: "RM 50",  color: "#51A092" },
    DUITKERTASRM100: { label: "RM 100", color: "#9286AF" },
  };
  // Class names that mean "no banknote in view" — won't be announced.
  const NO_NOTE_KEYS = new Set(["BACKGROUND", "NOTHING", "NONE", "EMPTY", "NEGATIVE", "OTHER", "BLANK"]);

  const viewport = document.getElementById("viewport");
  const placeholder = document.getElementById("placeholder");
  const toggleBtn = document.getElementById("toggleBtn");
  const voiceToggle = document.getElementById("voiceToggle");
  const resultEyebrow = document.getElementById("resultEyebrow");
  const resultValue = document.getElementById("resultValue");
  const resultConfidence = document.getElementById("resultConfidence");
  const resultCard = document.getElementById("resultCard");
  const denomGrid = document.getElementById("denomGrid");

  let model, webcam, running = false;
  let lastAnnounced = null;
  let lastAnnouncedTime = 0;
  let scanStartTime = 0;
  let autoStopTimer = null;
  let bestResult = null; // { key, probability } — best seen during this scan session

  // Build the live confidence list for the six denominations.
  const barEls = {};
  Object.entries(DENOMINATIONS).forEach(([key, info]) => {
    const row = document.createElement("div");
    row.className = "denom-row";
    row.innerHTML = `
      <span class="denom-swatch" style="background:${info.color}"></span>
      <span class="denom-label">${info.label}</span>
      <div class="denom-bar"><div class="denom-bar-fill" style="background:${info.color}"></div></div>
      <span class="denom-pct">0%</span>
    `;
    denomGrid.appendChild(row);
    barEls[key] = {
      row,
      fill: row.querySelector(".denom-bar-fill"),
      pct: row.querySelector(".denom-pct"),
    };
  });

  function normalize(name) {
    return name.toUpperCase().replace(/[^A-Z0-9]/g, "");
  }

  function setFrameColor(color) {
    document.documentElement.style.setProperty("--frame-color", color);
  }

  function showWaiting(secondsLeft) {
    resultCard.classList.remove("is-active");
    resultEyebrow.textContent = "Scanning";
    resultValue.textContent = "—";
    resultValue.style.color = "var(--text)";
    const timer = secondsLeft !== undefined ? ` (${secondsLeft}s)` : "";
    resultConfidence.textContent = `Hold a banknote steady in the frame.${timer}`;
    setFrameColor("var(--accent)");
  }

  function showResult(key, probability) {
    const info = DENOMINATIONS[key];
    resultCard.classList.add("is-active");
    resultEyebrow.textContent = "Detected";
    resultValue.textContent = info.label;
    resultValue.style.color = info.color;
    resultConfidence.textContent = Math.round(probability * 100) + "% confidence";
    setFrameColor(info.color);
  }

  function showLockedResult(key, probability, reason) {
    const info = DENOMINATIONS[key];
    resultCard.classList.add("is-active");
    resultEyebrow.textContent = reason === "threshold" ? "✓ Locked — High confidence" : "✓ Locked — Best match";
    resultValue.textContent = info.label;
    resultValue.style.color = info.color;
    resultConfidence.textContent = Math.round(probability * 100) + "% confidence · Tap Start scanning to scan again";
    setFrameColor(info.color);
  }

  function showSetupMessage() {
    resultEyebrow.textContent = "Setup needed";
    resultValue.textContent = "No model loaded";
    resultValue.style.color = "var(--text)";
    resultConfidence.innerHTML = 'Add your model link to <code>MODEL_URL</code> in the script — see "Setup" below, or train one at <a href="https://teachablemachine.withgoogle.com" target="_blank" rel="noopener">Teachable Machine</a>.';
  }

  function maybeAnnounce(key) {
    if (!voiceToggle.checked || !("speechSynthesis" in window)) return;
    const now = Date.now();
    if (key === lastAnnounced && now - lastAnnouncedTime < ANNOUNCE_COOLDOWN_MS) return;
    lastAnnounced = key;
    lastAnnouncedTime = now;
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(DENOMINATIONS[key].label));
  }

  async function predict() {
    const predictions = await model.predict(webcam.canvas);

    // TEMPORARY DEBUG LINE — remove once everything works.
    console.log(predictions.map(p => `${p.className}: ${(p.probability * 100).toFixed(0)}%`).join("  |  "));

    let top = predictions[0];

    predictions.forEach((p) => {
      const key = normalize(p.className);
      if (barEls[key]) {
        const pct = Math.round(p.probability * 100);
        barEls[key].fill.style.width = pct + "%";
        barEls[key].pct.textContent = pct + "%";
      }
      if (p.probability > top.probability) top = p;
    });

    const topKey = normalize(top.className);
    Object.values(barEls).forEach((el) => el.row.classList.remove("is-leading"));

    // Track best denomination result seen this session (ignore background/noise classes)
    if (DENOMINATIONS[topKey] && top.probability >= CONFIDENCE_THRESHOLD) {
      if (!bestResult || top.probability > bestResult.probability) {
        bestResult = { key: topKey, probability: top.probability };
      }
    }

    // 🔒 Lock immediately if confidence hits the threshold
    if (top.probability >= LOCK_THRESHOLD && DENOMINATIONS[topKey]) {
      if (barEls[topKey]) barEls[topKey].row.classList.add("is-leading");
      lockResult(topKey, top.probability, "threshold");
      return;
    }

    if (top.probability >= CONFIDENCE_THRESHOLD && DENOMINATIONS[topKey]) {
      if (barEls[topKey]) barEls[topKey].row.classList.add("is-leading");
      const secondsLeft = Math.ceil((AUTO_STOP_MS - (Date.now() - scanStartTime)) / 1000);
      showResult(topKey, top.probability);
      resultConfidence.textContent = Math.round(top.probability * 100) + `% confidence · auto-locks in ${Math.max(0, secondsLeft)}s`;
    } else if (top.probability >= CONFIDENCE_THRESHOLD && NO_NOTE_KEYS.has(topKey)) {
      const secondsLeft = Math.ceil((AUTO_STOP_MS - (Date.now() - scanStartTime)) / 1000);
      showWaiting(Math.max(0, secondsLeft));
      lastAnnounced = null;
    } else {
      const secondsLeft = Math.ceil((AUTO_STOP_MS - (Date.now() - scanStartTime)) / 1000);
      showWaiting(Math.max(0, secondsLeft));
    }
  }

  function lockResult(key, probability, reason) {
    // Stop scanning
    running = false;
    if (autoStopTimer) { clearTimeout(autoStopTimer); autoStopTimer = null; }
    webcam.stop();
    placeholder.hidden = false;
    viewport.classList.remove("is-scanning");
    toggleBtn.textContent = "Start scanning";

    // Highlight the winning bar
    Object.values(barEls).forEach((el) => el.row.classList.remove("is-leading"));
    if (barEls[key]) barEls[key].row.classList.add("is-leading");

    // Show the locked result
    showLockedResult(key, probability, reason);
    maybeAnnounce(key);
  }

  async function loop() {
    if (!running) return;
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function init() {
    model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
  }

  async function setupWebcam() {
    // Remove any old canvas left over from a previous session
    const container = document.getElementById("webcam-container");
    container.innerHTML = "";
    webcam = new tmImage.Webcam(400, 400, false);
    try {
      await webcam.setup({ facingMode: "environment" });
    } catch (err) {
      await webcam.setup();
    }
    container.appendChild(webcam.canvas);
  }

  async function startScanning() {
    await setupWebcam();
    await webcam.play();
    placeholder.hidden = true;
    viewport.classList.add("is-scanning");
    running = true;
    bestResult = null;
    scanStartTime = Date.now();
    toggleBtn.textContent = "Stop scanning";
    showWaiting(Math.ceil(AUTO_STOP_MS / 1000));

    // Auto-stop after AUTO_STOP_MS and commit to best result seen
    autoStopTimer = setTimeout(() => {
      if (!running) return;
      if (bestResult) {
        lockResult(bestResult.key, bestResult.probability, "timeout");
      } else {
        // Nothing detected at all — just stop cleanly
        running = false;
        webcam.stop();
        placeholder.hidden = false;
        viewport.classList.remove("is-scanning");
        toggleBtn.textContent = "Start scanning";
        resultEyebrow.textContent = "No result";
        resultValue.textContent = "—";
        resultConfidence.textContent = "No banknote detected. Try again with better lighting.";
        setFrameColor("var(--accent)");
      }
    }, AUTO_STOP_MS);

    window.requestAnimationFrame(loop);
  }

  function stopScanning() {
    running = false;
    if (autoStopTimer) { clearTimeout(autoStopTimer); autoStopTimer = null; }
    webcam.stop();
    placeholder.hidden = false;
    viewport.classList.remove("is-scanning");
    toggleBtn.textContent = "Start scanning";
  }

  toggleBtn.addEventListener("click", async () => {
    if (running) {
      stopScanning();
      return;
    }
    if (!model) {
      toggleBtn.disabled = true;
      toggleBtn.textContent = "Loading model…";
      try {
        await init();
      } catch (err) {
        console.error(err);
        showSetupMessage();
        toggleBtn.disabled = false;
        toggleBtn.textContent = "Start scanning";
        return;
      }
      toggleBtn.disabled = false;
    }
    await startScanning();
  });
</script>
</body>
</html>
